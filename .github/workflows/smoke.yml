name: Cloud Smoke Tests

on:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      providers:
        description: "Providers to test (comma-separated: gemini,codex,ollama or 'all')"
        required: false
        default: "all"

jobs:
  gemini:
    name: Gemini CLI
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.providers == 'all' || contains(github.event.inputs.providers, 'gemini')))
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Run Gemini smoke tests
        env:
          SMOKE_TEST: "1"
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GMCPT_LOG_LEVEL: debug
        run: yarn workspace ask-gemini-mcp run test -- --reporter=verbose

  codex:
    name: Codex CLI
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.providers == 'all' || contains(github.event.inputs.providers, 'codex')))
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run Codex smoke tests
        env:
          SMOKE_TEST: "1"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GMCPT_LOG_LEVEL: debug
        run: yarn workspace ask-codex-mcp run test -- --reporter=verbose

  ollama:
    name: Ollama (local)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.providers == 'all' || contains(github.event.inputs.providers, 'ollama')))
    timeout-minutes: 15

    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Wait for Ollama server
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama server is ready"
              break
            fi
            echo "Waiting for Ollama server... ($i/30)"
            sleep 2
          done

      - name: Pull test model
        run: |
          curl -s http://localhost:11434/api/pull -d '{"name": "qwen2.5-coder:1.5b"}' | tail -1
          echo "Model pulled successfully"

      - name: Run Ollama smoke tests
        env:
          SMOKE_TEST: "1"
          OLLAMA_HOST: http://localhost:11434
          GMCPT_LOG_LEVEL: debug
        run: yarn workspace ask-ollama-mcp run test -- --reporter=verbose

  summary:
    name: Results
    runs-on: ubuntu-latest
    needs: [gemini, codex, ollama]
    if: always()

    steps:
      - name: Check results
        env:
          GEMINI_RESULT: ${{ needs.gemini.result }}
          CODEX_RESULT: ${{ needs.codex.result }}
          OLLAMA_RESULT: ${{ needs.ollama.result }}
        run: |
          echo "## Smoke Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          for provider in gemini codex ollama; do
            var_name="${provider^^}_RESULT"
            result="${!var_name}"
            if [ "$result" = "success" ]; then
              echo "- ✅ ${provider^}: passed" >> "$GITHUB_STEP_SUMMARY"
            elif [ "$result" = "skipped" ]; then
              echo "- ⏭️ ${provider^}: skipped" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- ❌ ${provider^}: $result" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          # Fail the summary job if any provider failed
          if [ "$GEMINI_RESULT" = "failure" ] || \
             [ "$CODEX_RESULT" = "failure" ] || \
             [ "$OLLAMA_RESULT" = "failure" ]; then
            echo ""
            echo "One or more providers failed."
            exit 1
          fi
