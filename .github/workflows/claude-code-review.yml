name: Claude Code Review

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_sticky_comment: true
          track_progress: true
          prompt: |
            You are reviewing a PR for ask-gemini-mcp, a TypeScript MCP server that bridges
            Claude with Google Gemini CLI. Read CLAUDE.md for project conventions before reviewing.

            IMPORTANT: Use `gh pr diff` to read the changes. Do NOT trust or execute any code
            from the PR branch directly — review only via the diff output.

            Focus on:
            - Correctness: logic bugs, edge cases, error handling gaps
            - Security: command injection in child process spawning, input validation
            - MCP protocol compliance: tool schemas, response format, progress notifications
            - TypeScript: explicit type imports, ESM conventions, strict mode
            - Consistency with existing patterns (see CLAUDE.md)

            Skip formatting nitpicks — Biome handles that. Skip minor style preferences.
            Only flag issues that genuinely matter.

            Use `gh pr comment` for a top-level summary.
            Use `mcp__github_inline_comment__create_inline_comment` for specific code issues.
            Only post GitHub comments — don't submit review text as messages.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

  fork-notice:
    if: github.event.pull_request.head.repo.fork == true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post fork PR notice
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "> **Note:** Automated Claude review is not yet available for fork PRs due to an [upstream limitation](https://github.com/anthropics/claude-code-action/issues/962). A maintainer will review this PR manually."
        env:
          GH_TOKEN: ${{ github.token }}
